<div class="product-card">
  <img [src]="product.image" alt="{{ product.name }}" />

  <h2>
    <a [href]="product.link" target="_blank" rel="noopener noreferrer">
      {{ product.name }}
    </a>
  </h2>

  <p>{{ product.description }}</p>

  <p><strong>Price:</strong> {{ formatPrice(product.price) }} ₸</p>

  <p class="rating">
    <span class="stars">
      <span *ngFor="let s of getStars(product.rating)">{{ s }}</span>
    </span>
    <span class="badge">{{ product.rating }}</span>
  </p>

  <div class="actions">
    <button class="like-btn" [class.bump]="liked" (click)="like()">
       Like ({{ product.likes }})
    </button>

    <button class="delete-btn" (click)="onDelete()">🗑 Delete</button>
  </div>

  <a [href]="getWhatsAppLink()" target="_blank" class="share-btn">
    Share via WhatsApp
  </a>
</div>
